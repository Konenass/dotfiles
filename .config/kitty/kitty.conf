# This work is licensed under the terms of the MIT license.
# For a copy, see https://opensource.org/licenses/MIT.

background  #282828
foreground  #ebdbb2

cursor                #928374

selection_foreground  #928374
selection_background  #3c3836

# Black
color0  #282828
# Dark Grey
color8  #928374

# Red
color1                #cc241d
# Light Red
color9                #fb4934

# Green
color2                #98971a
# Light Green
color10               #b8bb26

# Yellow
color3                #d79921
# Light Yellow
color11               #fabd2d

# Blue
color4                #458588
# Light Blue
color12               #83a598

# Magenta
color5                #b16286
# Light Magenta
color13               #d3869b

# Cyan
color6                #689d6a
# Light Cyan
color14               #8ec07c

# Light Gray
color7                #a89984
# White
color15               #ebdbb2

cursor_shape          underline

url_color      #fbf1c7
url_style      curly
open_url_with  default

# The audio bell will burn.
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no
command_on_bell none

background_opacity 0.9

editor emacs

disable-ligatures never

font_family Iosevka Term 
italic_font auto
bold_font auto
bold_italic_font auto
font_size 13.0

confirm_os_window_close 0
